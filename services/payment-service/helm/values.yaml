replicaCount: 2

image:
  repository: ""  # set by CI: <account>.dkr.ecr.us-east-1.amazonaws.com/aerolink-dev/payment-service
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3000

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

serviceAccount:
  create: true
  name: payment-service
  annotations: {}  # eks.amazonaws.com/role-arn injected by Terraform/IRSA

livenessProbe:
  httpGet:
    path: /api/v1/health/live
    port: 3000
  initialDelaySeconds: 20
  periodSeconds: 10
readinessProbe:
  httpGet:
    path: /api/v1/health/ready
    port: 3000
  initialDelaySeconds: 25
  periodSeconds: 10

podDisruptionBudget:
  enabled: true
  minAvailable: 1

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

migrations:
  enabled: true

env:
  - name: NODE_ENV
    value: production
  - name: PORT
    value: "3000"
  - name: AWS_REGION
    value: us-east-1
  - name: KAFKA_AUTH
    value: iam

externalSecrets:
  enabled: true
  refreshInterval: 1h
  secrets:
    - secretKey: DATABASE_URL
      remoteRef: { key: /aerolink/dev/payment-service/db-url }
    - secretKey: KAFKA_BROKERS
      remoteRef: { key: /aerolink/dev/shared/kafka-brokers }
    - secretKey: STRIPE_API_KEY
      remoteRef: { key: /aerolink/dev/payment-service/stripe-api-key }
