apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
  annotations:
    alb.ingress.kubernetes.io/healthcheck-path: /api/v1/health/live
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ .Release.Name }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 3000
