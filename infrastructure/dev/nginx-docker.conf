# API Gateway config for full Docker-Compose stack.
# Services run inside Docker — reachable via container name:3000.
# (Compare with nginx-local.conf which proxies to host.docker.internal:300x
#  for when NestJS services run directly on the host with 'npm run dev'.)

upstream identity      { server identity-service:3000; }
upstream flights       { server flight-service:3000;   }
upstream bookings      { server booking-service:3000;  }
upstream payments      { server payment-service:3000;  }
upstream checkin       { server checkin-service:3000;  }
upstream baggage       { server baggage-service:3000;  }
upstream notification  { server notification-service:3000; }

server {
    listen 8080;

    # Passed through to every proxied request
    proxy_set_header Authorization        $http_authorization;
    proxy_set_header X-Correlation-ID     $http_x_correlation_id;
    proxy_set_header Host                 $host;
    proxy_set_header X-Real-IP            $remote_addr;
    proxy_set_header X-Forwarded-For      $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto    $scheme;

    # Timeouts — generous for cold-start JIT compilation
    proxy_connect_timeout  10s;
    proxy_send_timeout     30s;
    proxy_read_timeout     30s;

    location /api/v1/auth         { proxy_pass http://identity;     }
    location /api/v1/users        { proxy_pass http://identity;     }
    location /api/v1/flights      { proxy_pass http://flights;      }
    location /api/v1/bookings     { proxy_pass http://bookings;     }
    location /api/v1/payments     { proxy_pass http://payments;     }
    location /api/v1/checkin      { proxy_pass http://checkin;      }
    location /api/v1/baggage      { proxy_pass http://baggage;      }
    location /api/v1/notifications{ proxy_pass http://notification; }

    # ALB health check endpoint
    location /healthz { return 200 "ok\n"; access_log off; }
}
