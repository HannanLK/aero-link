# Local API Gateway — mirrors production API Gateway routing
# Services run on the host; nginx reaches them via host.docker.internal

upstream identity  { server host.docker.internal:3001; }
upstream flights   { server host.docker.internal:3002; }
upstream bookings  { server host.docker.internal:3003; }
upstream payments  { server host.docker.internal:3004; }
upstream checkin   { server host.docker.internal:3005; }
upstream baggage   { server host.docker.internal:3006; }

server {
    listen 8080;

    # Pass JWT through unchanged
    proxy_set_header Authorization $http_authorization;
    proxy_set_header X-Correlation-ID $http_x_correlation_id;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;

    location /api/v1/auth        { proxy_pass http://identity; }
    location /api/v1/users       { proxy_pass http://identity; }
    location /api/v1/flights     { proxy_pass http://flights;  }
    location /api/v1/bookings    { proxy_pass http://bookings; }
    location /api/v1/payments    { proxy_pass http://payments; }
    location /api/v1/checkin     { proxy_pass http://checkin;  }
    location /api/v1/baggage     { proxy_pass http://baggage;  }

    # Health
    location /healthz { return 200 "ok\n"; }
}
