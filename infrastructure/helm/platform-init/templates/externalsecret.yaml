# Pulls the Aurora ADMIN url. sync-wave -2 → created & materialised before the
# bootstrap Job (wave -1) and the app Deployments (wave 0). Kept as a normal
# (non-hook) resource so the resulting Secret persists for the Job to read.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: platform-init-secrets
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: platform-init-secrets
    creationPolicy: Owner
  data:
    - secretKey: AURORA_ADMIN_URL
      remoteRef:
        key: /aerolink/dev/shared/aurora-admin-url
