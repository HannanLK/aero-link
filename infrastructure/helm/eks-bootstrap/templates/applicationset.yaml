apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: aerolink-services
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - service: platform-init
            path: infrastructure/helm/platform-init
            namespace: aerolink
          - service: identity-service
            path: services/identity-service/helm
            namespace: aerolink
          - service: flight-service
            path: services/flight-service/helm
            namespace: aerolink
          - service: booking-service
            path: services/booking-service/helm
            namespace: aerolink
          - service: payment-service
            path: services/payment-service/helm
            namespace: aerolink
          - service: checkin-service
            path: services/checkin-service/helm
            namespace: aerolink
          - service: baggage-service
            path: services/baggage-service/helm
            namespace: aerolink
          - service: notification-service
            path: services/notification-service/helm
            namespace: aerolink
          - service: webui
            path: webui/helm
            namespace: aerolink
  template:
    metadata:
      name: "{{service}}"
      namespace: argocd
    spec:
      project: default
      source:
        repoURL: https://github.com/HannanLK/aero-link.git
        targetRevision: main
        path: "{{path}}"
        helm:
          valueFiles:
            - values.yaml
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{namespace}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - PrunePropagationPolicy=foreground
          - RespectIgnoreDifferences=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
      ignoreDifferences:
        - group: apps
          kind: Deployment
          jsonPointers:
            - /spec/replicas
