version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# FULL LOCAL STACK — infrastructure + all 7 NestJS services + demo seed
#
# Usage (first run — builds images, ~5-10 min):
#   docker compose -f docker-compose.full.yml up -d --build
#
# Usage (subsequent runs — reuse cached images):
#   docker compose -f docker-compose.full.yml up -d
#
# View logs:
#   docker compose -f docker-compose.full.yml logs -f identity-service
#
# Demo credentials (seeded automatically):
#   admin@aerolink.app       / Demo@2024  (ADMIN)
#   passenger@aerolink.app   / Demo@2024  (PASSENGER)
#   gateagent@aerolink.app   / Demo@2024  (GATE_AGENT)
#   flightops@aerolink.app   / Demo@2024  (FLIGHT_OPS)
#   immigration@aerolink.app / Demo@2024  (IMMIGRATION_OFFICER)
#
# After `up`, open: http://localhost:5173 (webui npm run dev)
#                   http://localhost:8080  (NGINX API gateway)
#                   http://localhost:8090  (Kafka UI)
# ─────────────────────────────────────────────────────────────────────────────

x-service-defaults: &service-defaults
  restart: unless-stopped
  networks:
    - aerolink

x-build-defaults: &build-defaults
  context: .   # monorepo root — required by all Dockerfiles

x-db-url: &db-url postgresql://aerolink:aerolink_dev@postgres:5432

x-kafka-env: &kafka-env
  KAFKA_BROKERS: kafka:29092

x-jwt-env: &jwt-env
  JWT_SECRET: aerolink_local_jwt_secret_32charsX
  JWT_REFRESH_SECRET: aerolink_local_refresh_32charsXXX
  JWT_EXPIRES_IN: 15m
  JWT_REFRESH_EXPIRES_IN: 7d

# ─── Infrastructure ───────────────────────────────────────────────────────────

services:

  postgres:
    <<: *service-defaults
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aerolink
      POSTGRES_PASSWORD: aerolink_dev
      POSTGRES_DB: aerolink
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/dev/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aerolink"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    <<: *service-defaults
    image: redis:7-alpine
    command: redis-server --requirepass aerolink_dev --loglevel warning
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "aerolink_dev", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  zookeeper:
    <<: *service-defaults
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    <<: *service-defaults
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 15

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    networks: [aerolink]
    depends_on:
      kafka:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        for topic in \
          aerolink.booking.created aerolink.booking.confirmed \
          aerolink.booking.cancelled aerolink.booking.payment-initiated \
          aerolink.booking.seat-released aerolink.seat-lock.confirmed \
          aerolink.seat-lock.failed aerolink.payment.completed \
          aerolink.payment.failed aerolink.checkin.completed \
          aerolink.baggage.tagged aerolink.baggage.scanned \
          aerolink.baggage.status-updated aerolink.identity.registered \
          aerolink.dlq
        do
          kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
            --topic $$topic --partitions 3 --replication-factor 1
          echo "✓ $$topic"
        done

  dynamodb-local:
    <<: *service-defaults
    image: amazon/dynamodb-local:latest
    ports:
      - "8000:8000"
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-inMemory"]

# ─── Prisma Migrations (one-shot, run before each service starts) ─────────────

  identity-migrate:
    build:
      <<: *build-defaults
      dockerfile: services/identity-service/Dockerfile
    networks: [aerolink]
    user: root                         # needs write access to prisma engine cache
    command: ["node_modules/.bin/prisma", "migrate", "deploy"]
    environment:
      DATABASE_URL: *db-url/identity_service
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  flight-migrate:
    build:
      <<: *build-defaults
      dockerfile: services/flight-service/Dockerfile
    networks: [aerolink]
    user: root
    command: ["node_modules/.bin/prisma", "migrate", "deploy"]
    environment:
      DATABASE_URL: *db-url/flight_service
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  booking-migrate:
    build:
      <<: *build-defaults
      dockerfile: services/booking-service/Dockerfile
    networks: [aerolink]
    user: root
    command: ["node_modules/.bin/prisma", "migrate", "deploy"]
    environment:
      DATABASE_URL: *db-url/booking_service
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  payment-migrate:
    build:
      <<: *build-defaults
      dockerfile: services/payment-service/Dockerfile
    networks: [aerolink]
    user: root
    command: ["node_modules/.bin/prisma", "migrate", "deploy"]
    environment:
      DATABASE_URL: *db-url/payment_service
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  checkin-migrate:
    build:
      <<: *build-defaults
      dockerfile: services/checkin-service/Dockerfile
    networks: [aerolink]
    user: root
    command: ["node_modules/.bin/prisma", "migrate", "deploy"]
    environment:
      DATABASE_URL: *db-url/checkin_service
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

# ─── NestJS Application Services ─────────────────────────────────────────────

  identity-service:
    <<: *service-defaults
    build:
      <<: *build-defaults
      dockerfile: services/identity-service/Dockerfile
    ports:
      - "3001:3000"
    environment:
      PORT: 3000
      <<: [*kafka-env, *jwt-env]
      DATABASE_URL: *db-url/identity_service
    depends_on:
      identity-migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/v1/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  flight-service:
    <<: *service-defaults
    build:
      <<: *build-defaults
      dockerfile: services/flight-service/Dockerfile
    ports:
      - "3002:3000"
    environment:
      PORT: 3000
      <<: *kafka-env
      DATABASE_URL: *db-url/flight_service
      REDIS_URL: redis://:aerolink_dev@redis:6379
    depends_on:
      flight-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/v1/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  booking-service:
    <<: *service-defaults
    build:
      <<: *build-defaults
      dockerfile: services/booking-service/Dockerfile
    ports:
      - "3003:3000"
    environment:
      PORT: 3000
      <<: *kafka-env
      DATABASE_URL: *db-url/booking_service
    depends_on:
      booking-migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/v1/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  payment-service:
    <<: *service-defaults
    build:
      <<: *build-defaults
      dockerfile: services/payment-service/Dockerfile
    ports:
      - "3004:3000"
    environment:
      PORT: 3000
      <<: *kafka-env
      DATABASE_URL: *db-url/payment_service
      # Replace with a real Stripe test key: sk_test_...
      STRIPE_SECRET_KEY: sk_test_placeholder_replace_before_use
    depends_on:
      payment-migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/v1/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  checkin-service:
    <<: *service-defaults
    build:
      <<: *build-defaults
      dockerfile: services/checkin-service/Dockerfile
    ports:
      - "3005:3000"
    environment:
      PORT: 3000
      <<: *kafka-env
      DATABASE_URL: *db-url/checkin_service
      LAMBDA_QR_DISABLED: "true"       # no AWS Lambda in local dev
    depends_on:
      checkin-migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/v1/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  baggage-service:
    <<: *service-defaults
    build:
      <<: *build-defaults
      dockerfile: services/baggage-service/Dockerfile
    ports:
      - "3006:3000"
    environment:
      PORT: 3000
      <<: *kafka-env
      AWS_REGION: ap-southeast-1
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      DYNAMODB_ENDPOINT: http://dynamodb-local:8000
      DYNAMODB_BAGGAGE_TABLE: baggage-items
    depends_on:
      dynamodb-local:
        condition: service_started
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/v1/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  notification-service:
    <<: *service-defaults
    build:
      <<: *build-defaults
      dockerfile: services/notification-service/Dockerfile
    ports:
      - "3007:3000"
    environment:
      PORT: 3000
      <<: *kafka-env
      NOTIFICATION_DRIVER: log     # logs to stdout; no SES in local dev
    depends_on:
      kafka:
        condition: service_healthy

# ─── API Gateway ─────────────────────────────────────────────────────────────

  api-gateway:
    <<: *service-defaults
    image: nginx:1.27-alpine
    ports:
      - "8080:8080"
    volumes:
      # Uses docker config — routes to service container names, not host ports
      - ./infrastructure/dev/nginx-docker.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      identity-service:
        condition: service_healthy
      flight-service:
        condition: service_healthy
      booking-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

# ─── Demo Seed ───────────────────────────────────────────────────────────────

  demo-seed:
    image: alpine:3.19
    networks: [aerolink]
    restart: "no"
    volumes:
      - ./infrastructure/dev/seed-demo.sh:/seed-demo.sh:ro
    entrypoint: ["/bin/sh", "/seed-demo.sh"]
    depends_on:
      identity-service:
        condition: service_healthy
      postgres:
        condition: service_healthy

# ─── Kafka UI ────────────────────────────────────────────────────────────────

  kafka-ui:
    <<: *service-defaults
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy

networks:
  aerolink:
    driver: bridge

volumes:
  postgres_data:
