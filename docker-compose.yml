version: "3.9"

# ---------------------------------------------------------------------------
# Local development — infrastructure only.
# NestJS services are started on the host with: npm run dev
# ---------------------------------------------------------------------------

services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: aerolink
      POSTGRES_PASSWORD: aerolink_dev
      POSTGRES_DB: aerolink
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/dev/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aerolink"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass aerolink_dev --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "aerolink_dev", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 15

  # Creates all 15 AeroLink topics with proper partition counts then exits.
  # Topics are already created deterministically; auto-create is kept as fallback.
  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      kafka:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        BOOTSTRAP=kafka:29092
        for topic in \
          aerolink.booking.created \
          aerolink.booking.confirmed \
          aerolink.booking.cancelled \
          aerolink.booking.payment-initiated \
          aerolink.booking.seat-released \
          aerolink.seat-lock.confirmed \
          aerolink.seat-lock.failed \
          aerolink.payment.completed \
          aerolink.payment.failed \
          aerolink.checkin.completed \
          aerolink.baggage.tagged \
          aerolink.baggage.scanned \
          aerolink.baggage.status-updated \
          aerolink.identity.registered \
          aerolink.dlq
        do
          kafka-topics --bootstrap-server $$BOOTSTRAP \
            --create --if-not-exists \
            --topic $$topic \
            --partitions 3 \
            --replication-factor 1
          echo "✓ $$topic"
        done
        echo "All Kafka topics ready."

  dynamodb-local:
    image: amazon/dynamodb-local:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-inMemory"]
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8000/shell/ | grep -q DynamoDB || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Local API gateway — routes /api/v1/* to the correct service on the host.
  # NOTE: host.docker.internal is provided automatically by Docker Desktop
  # (Windows & Mac). The extra_hosts entry below is only needed on bare
  # Linux Docker Engine — remove it if running on Docker Desktop.
  api-gateway:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ./infrastructure/dev/nginx-local.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"   # Linux-only: remove on Docker Desktop
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  # Optional: Kafka topic browser at http://localhost:8090
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

volumes:
  postgres_data:
